<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#087f74">
    <title>FlowDrop Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; color: #172033; background: #eef4f4; }
      main { width: min(360px, calc(100% - 32px)); padding: 22px; background: rgb(255 255 255 / 82%); border: 1px solid rgb(15 23 42 / 10%); border-radius: 10px; box-shadow: 0 10px 25px rgb(30 61 67 / 8%); }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0; color: #69768a; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>FlowDrop is waiting for the network. If rider GPS is active, new locations will queue in the app and send when the connection returns.</p>
    </main>
  </body>
</html>
